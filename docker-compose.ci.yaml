name: journal
volumes:
  mysql-main:

services:
  mysql:
    image: mysql:latest
    ports:
    - 3306:3306
    volumes: 
    - mysql-main:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    image: steffenp123/journal-api:latest
    ports: 
    - 8000:8000
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEFAULT_USER: ${DEFAULT_USER}
      DEFAULT_USER_PASSWORD: ${DEFAULT_USER_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SQS_ENDPOINT_URL: http://elasticmq:9324
      EMAIL_VERIFICATION_QUEUE_URL: http://elasticmq:9324/000000000000/email-verification
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    depends_on:
      mysql:
        condition: service_healthy
      elasticmq:
        condition: service_healthy

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
    - 9324:9324
    - 9325:9325
    volumes:
    - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9324"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  worker:
    image: steffenp123/journal-worker:latest
    restart: on-failure
    environment:
      SQS_ENDPOINT_URL: http://elasticmq:9324
      EMAIL_VERIFICATION_QUEUE_URL: http://elasticmq:9324/000000000000/email-verification
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    depends_on:
      elasticmq:
        condition: service_healthy