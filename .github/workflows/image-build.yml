name: Journal API Image Build
on:
  push:
    branches:
    - main
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v6
    - name: Install python to runner
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install app dependancies
      run: pip install -r app/requirements.txt
    - name: Run unit tests
      run: pytest app/tests/unit

  integration-test:
    runs-on: ubuntu-latest
    env:
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      DEFAULT_USER: ${{ secrets.DEFAULT_USER }}
      DEFAULT_USER_PASSWORD: ${{ secrets.DEFAULT_USER_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DOCKER_ENV: ${{ secrets.DOCKER_ENV }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v6
    - name: Install python to runner
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
    - name: Install app dependancies
      run: pip install -r app/requirements.txt
    - name: Run docker compose
      run: docker compose -f docker-compose.ci.yaml up -d mysql
    - name: Initialize journal API database
      run: python -m app.init_db
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_LOCAL }}
    - name: Run integration tests
      run: pytest app/tests/integration
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_LOCAL }}

  build-and-push:
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v4
    - name: Login to Dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKERHUB_USER}}
        password: ${{secrets.DOCKERHUB_PAT}}
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: ./
        file: ./Dockerfile
        push: true
        tags: |
          steffenp123/journal-api:1.${{ github.run_number }}
          steffenp123/journal-api:latest